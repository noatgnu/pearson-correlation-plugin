plugin:
  id: "pearson-correlation"
  name: "Pearson Correlation Analysis"
  description: "Calculate Pearson correlation between protein abundance and a target variable with FDR BH correction."
  version: "1.0.0"
  category: "statistics"
  author: "CauldronGO Team"
  icon: "scatter_plot"

runtime:
  environments: ["python"]
  entrypoint: "pearson_correlation.py"

inputs:
  - name: "input_file"
    label: "Input File"
    type: "file"
    required: true
    accept: ".csv,.tsv,.txt"
    description: "Data matrix file with proteins as rows and samples as columns."

  - name: "annotation_file"
    label: "Sample Annotation File"
    type: "file"
    required: true
    accept: ".csv,.tsv,.txt"
    description: "Sample annotation file containing Sample and target columns."

  - name: "index_col"
    label: "Index Column"
    type: "column-selector"
    required: true
    multiple: false
    sourceFile: "input_file"
    description: "Column containing protein identifiers."

  - name: "target_col"
    label: "Target Column"
    type: "text"
    required: true
    description: "Numeric column name from annotation to correlate with."

  - name: "imputation"
    label: "Imputation Method"
    type: "select"
    required: false
    default: "none"
    options:
      - "none"
      - "mean"
      - "median"
      - "zero"
      - "knn"
    description: "Method for handling missing values. Select 'none' if data is pre-imputed."

  - name: "knn_neighbors"
    label: "KNN Neighbors"
    type: "number"
    required: false
    default: 5
    min: 1
    max: 20
    step: 1
    description: "Number of neighbors for KNN imputation."
    visibleWhen:
      field: "imputation"
      equals: "knn"

  - name: "alpha"
    label: "Significance Level"
    type: "number"
    required: false
    default: 0.05
    min: 0.001
    max: 0.1
    step: 0.001
    description: "Significance threshold for FDR correction."

  - name: "log2_transform"
    label: "Log2 Transform Data"
    type: "boolean"
    required: false
    default: false
    description: "Apply log2 transformation to the data before correlation analysis."

  - name: "cluster_method"
    label: "Clustering Method"
    type: "select"
    required: false
    default: "none"
    options:
      - "none"
      - "kmeans"
      - "dbscan"
    description: "Method to cluster proteins based on correlation values."

  - name: "auto_k"
    label: "Auto-detect Cluster Count"
    type: "boolean"
    default: false
    description: "Automatically determine optimal number of clusters using elbow method."
    visibleWhen:
      field: "cluster_method"
      equals: "kmeans"

  - name: "n_clusters"
    label: "Number of Clusters"
    type: "number"
    required: false
    default: 5
    min: 2
    max: 20
    step: 1
    description: "Number of clusters for KMeans clustering."
    visibleWhen:
      field: "cluster_method"
      equals: "kmeans"

  - name: "max_k"
    label: "Max Clusters to Test"
    type: "number"
    required: false
    default: 10
    min: 3
    max: 30
    step: 1
    description: "Maximum number of clusters to test for elbow method."
    visibleWhen:
      field: "auto_k"
      equals: true

  - name: "dbscan_eps"
    label: "DBSCAN Epsilon"
    type: "number"
    required: false
    default: 0.5
    min: 0.01
    max: 10
    step: 0.01
    description: "Maximum distance for DBSCAN neighborhood."
    visibleWhen:
      field: "cluster_method"
      equals: "dbscan"

  - name: "dbscan_min_samples"
    label: "DBSCAN Min Samples"
    type: "number"
    required: false
    default: 5
    min: 2
    max: 50
    step: 1
    description: "Minimum samples for DBSCAN core points."
    visibleWhen:
      field: "cluster_method"
      equals: "dbscan"

outputs:
  - name: "correlation_results"
    path: "correlation_results.tsv"
    type: "data"
    format: "tsv"
    description: "Full correlation results with p-values and FDR-corrected q-values."

  - name: "significant_results"
    path: "significant_correlations.tsv"
    type: "data"
    format: "tsv"
    description: "Filtered results showing only significant correlations."

  - name: "volcano_plot"
    path: "volcano_plot.html"
    type: "html"
    format: "html"
    description: "Volcano plot showing correlation vs significance."

  - name: "cluster_plot"
    path: "cluster_plot.html"
    type: "html"
    format: "html"
    description: "Cluster plot showing proteins grouped by correlation clusters."

annotation:
  annotationFile: "annotation_file"

execution:
  argsMapping:
    input_file: "--input_file"
    annotation_file: "--annotation_file"
    index_col: "--index_col"
    target_col: "--target_col"
    imputation: "--imputation"
    knn_neighbors: "--knn_neighbors"
    alpha: "--alpha"
    log2_transform:
      flag: "--log2_transform"
      when: "true"
    cluster_method: "--cluster_method"
    auto_k:
      flag: "--auto_k"
      when: "true"
    n_clusters: "--n_clusters"
    max_k: "--max_k"
    dbscan_eps: "--dbscan_eps"
    dbscan_min_samples: "--dbscan_min_samples"
  outputDir: "--output_dir"
  requirements:
    python: ">=3.11"
    pythonRequirementsFile: "requirements.txt"

example:
  enabled: true
  values:
    input_file: "diann/imputed.data.txt"
    annotation_file: "diann/annotation_with_score.txt"
    index_col: "Protein.Group"
    target_col: "Score"
    imputation: "mean"
    alpha: 0.05
    log2_transform: true
    cluster_method: "kmeans"
    auto_k: true
    max_k: 6
