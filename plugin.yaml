plugin:
  id: "pearson-correlation"
  name: "Pearson Correlation Analysis"
  description: "Calculate Pearson correlation between protein abundance and a target variable with FDR BH correction."
  version: "1.0.0"
  category: "statistics"
  author: "CauldronGO Team"
  icon: "scatter_plot"

runtime:
  environments: ["python"]
  entrypoint: "pearson_correlation.py"

inputs:
  - name: "input_file"
    label: "Input File"
    type: "file"
    required: true
    accept: ".csv,.tsv,.txt"
    description: "Data matrix file with proteins as rows and samples as columns."

  - name: "annotation_file"
    label: "Sample Annotation File"
    type: "file"
    required: true
    accept: ".csv,.tsv,.txt"
    description: "Sample annotation file containing Sample and target columns."

  - name: "index_col"
    label: "Index Column"
    type: "column-selector"
    required: true
    multiple: false
    sourceFile: "input_file"
    description: "Column containing protein identifiers."

  - name: "target_col"
    label: "Target Column"
    type: "text"
    required: true
    description: "Numeric column name from annotation to correlate with."

  - name: "grouping_col"
    label: "Grouping Column"
    type: "text"
    required: false
    default: ""
    description: "Column from annotation to group samples for separate volcano plots per group."

  - name: "imputation"
    label: "Imputation Method"
    type: "select"
    required: false
    default: "none"
    options:
      - "none"
      - "mean"
      - "median"
      - "zero"
      - "knn"
    description: "Method for handling missing values. Select 'none' if data is pre-imputed."

  - name: "knn_neighbors"
    label: "KNN Neighbors"
    type: "number"
    required: false
    default: 5
    min: 1
    max: 20
    step: 1
    description: "Number of neighbors for KNN imputation."
    visibleWhen:
      field: "imputation"
      equals: "knn"

  - name: "alpha"
    label: "Significance Level"
    type: "number"
    required: false
    default: 0.05
    min: 0.001
    max: 0.1
    step: 0.001
    description: "Significance threshold for FDR correction."

  - name: "log2_transform"
    label: "Log2 Transform Data"
    type: "boolean"
    required: false
    default: false
    description: "Apply log2 transformation to the data before correlation analysis."

outputs:
  - name: "correlation_results"
    path: "correlation_results.tsv"
    type: "data"
    format: "tsv"
    description: "Full correlation results with p-values and FDR-corrected q-values."

  - name: "significant_results"
    path: "significant_correlations.tsv"
    type: "data"
    format: "tsv"
    description: "Filtered results showing only significant correlations."

  - name: "volcano_plot_adjusted"
    path: "volcano_plot_adjusted.html"
    type: "html"
    format: "html"
    description: "Volcano plot using FDR-adjusted p-values for significance cutoff."

  - name: "volcano_plot_raw"
    path: "volcano_plot_raw.html"
    type: "html"
    format: "html"
    description: "Volcano plot using raw p-values for significance cutoff."

  - name: "scatter_plots"
    path: "scatter_plots.html"
    type: "html"
    format: "html"
    description: "Scatter plots showing protein abundance vs target for top significant proteins."

  - name: "ranked_correlations"
    path: "ranked_correlations.html"
    type: "html"
    format: "html"
    description: "Bar plot showing proteins ranked by correlation coefficient."

annotation:
  annotationFile: "annotation_file"

execution:
  argsMapping:
    input_file: "--input_file"
    annotation_file: "--annotation_file"
    index_col: "--index_col"
    target_col: "--target_col"
    grouping_col: "--grouping_col"
    imputation: "--imputation"
    knn_neighbors: "--knn_neighbors"
    alpha: "--alpha"
    log2_transform:
      flag: "--log2_transform"
      when: "true"
  outputDir: "--output_dir"
  requirements:
    python: ">=3.11"
    pythonRequirementsFile: "requirements.txt"

example:
  enabled: true
  values:
    input_file: "diann/imputed.data.txt"
    annotation_file: "diann/annotation_with_score.txt"
    index_col: "Protein.Group"
    target_col: "Score"
    grouping_col: "Condition"
    imputation: "mean"
    alpha: 0.05
    log2_transform: true
